apiVersion: apps/v1
kind: Deployment
metadata:
  name: jobber-kibana
  namespace: production
spec:
  replicas: 1
  selector:
    matchLabels:
      app: jobber-kibana
  template:
    metadata:
      labels:
        app: jobber-kibana
    spec:
      containers:
        - name: jobber-kibana
          image: docker.elastic.co/kibana/kibana:8.11.0
          resources:
            limits:
              memory: "1Gi"
              cpu: "1500m"
            requests:
              cpu: 250m
              memory: 1Gi
          ports:
          - name: jobber-kibana
            containerPort: 5601
          env:
            - name: ELASTICSEARCH_HOSTS
              valueFrom:
                secretKeyRef:
                  name: jobber-backend-secret
                  key: jobber-elasticsearch-host
            - name: ELASTICSEARCH_USERNAME
              valueFrom:
                 secretKeyRef:
                   name: jobber-backend-secret
                   key: jobber-elasticsearch-username
            - name: ELASTICSEARCH_PASSWORD
              valueFrom:
                 secretKeyRef:
                   name: jobber-backend-secret
                   key: jobber-elasticsearch-password
            - name: ELASTICSEARCH_SERVICEACCOUNT_TOKEN
              valueFrom:
                 secretKeyRef:
                   name: jobber-backend-secret
                   key: jobber-elasticsearch-serviceaccount-token
          volumeMounts:
            - name: kibana-config
              mountPath: /usr/share/kibana/config
      volumes:
      - name: kibana-config
        configMap:
          name: kibana-config